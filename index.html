<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>POS Mini</title>

<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }
.header { padding:10px; background:#2563eb; color:white; display:flex; justify-content:space-between; }
.grid { display:grid; grid-template-columns: repeat(auto-fill,150px); gap:10px; padding:10px; }
.card { background:white; padding:10px; border-radius:10px; text-align:center; }
img { width:100%; height:100px; object-fit:cover; }
button { margin-top:5px; }
.cart { position:fixed; right:0; top:0; width:300px; height:100%; background:white; padding:10px; overflow:auto; }
</style>
</head>
<body>

<div class="header">
  <h3>Menu</h3>
  <button onclick="toggleCart()">🛒 (<span id="count">0</span>)</button>
</div>

<div id="menu" class="grid"></div>

<div id="cart" class="cart" style="display:none;">
  <h3>Giỏ hàng</h3>
  <div id="cartItems"></div>
  <h4 id="total"></h4>
  <button onclick="order()">Đặt đơn</button>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbz3XWqqLYNVt5X03qAgro9PZDuebR7DDVVN4CZ8z31dJ6mI9_AkSng1cbXmYRe12_fY/exec";

let menu = [];
let cart = {};

function toggleCart(){
  const el = document.getElementById("cart");
  el.style.display = el.style.display==="none" ? "block" : "none";
}

async function loadMenu(){
  const res = await fetch(API + "?action=menu");
  const data = await res.json();
  menu = data.data || [];
  render();
}

function render(){
  const el = document.getElementById("menu");
  el.innerHTML = menu.map(i => `
    <div class="card">
      <img src="${i.image || ''}" onerror="this.src='https://via.placeholder.com/150?text=No+Image'">
      <div>${i.name}</div>
      <div>${Number(i.price || 0).toLocaleString('vi-VN')} VNĐ</div>
      <button onclick="add('${i.id}')">+</button>
    </div>
  `).join("");
}

function add(id){
  const item = menu.find(x => x.id === id);
  if(!item) return;
  if(!cart[id]) cart[id] = {...item, quantity:0};
  cart[id].quantity++;
  renderCart();
}

function renderCart(){
  const items = Object.values(cart);
  document.getElementById("count").innerText =
    items.reduce((s,i)=>s+i.quantity,0);

  document.getElementById("cartItems").innerHTML =
    items.map(i => `${i.name} x ${i.quantity} - ${(i.price * i.quantity).toLocaleString('vi-VN')} VNĐ`).join("<br>");

  document.getElementById("total").innerText =
    "Tổng: " + items.reduce((s,i)=>s+i.price*i.quantity,0).toLocaleString('vi-VN') + " VNĐ";
}

async function order(){
  const items = Object.values(cart);
  if (!items.length) {
    alert("Giỏ hàng đang trống");
    return;
  }

  const res = await fetch(API,{
    method:"POST",
    headers: {
      "Content-Type": "text/plain;charset=utf-8"
    },
    body: JSON.stringify({
      action:"createOrder",
      order:{items}
    })
  });

  const data = await res.json();

  if (!data.success) {
    alert("Lỗi: " + data.message);
    return;
  }

  alert("Đã lưu đơn!");
  cart = {};
  renderCart();
}

loadMenu();
</script>

</body>
</html>
